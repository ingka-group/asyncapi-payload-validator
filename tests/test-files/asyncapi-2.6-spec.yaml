asyncapi: 2.6.0
info:
  title: Validator Test Spec
  version: 0.1.0
  description: Test AsyncAPI spec designed to exercise validator categories.
channels:
  test.events:
    publish:
      message:
        $ref: '#/components/messages/testMessage'
components:
  messages:
    testMessage:
      messageId: testMessage
      name: testMessage
      title: Test Message
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TestPayload'
  schemas:
    CommonRef:
      type: object
      properties:
        sharedValue:
          type: string
          enum: [A,B]
    TestPayload:
      type: object
      required:
        - id
        - variant
        - container
      properties:
        id:
          type: string
          pattern: 'ID-[0-9]{3}'
        variant:
          type: string
          enum: [v1, v2]
        container:
          type: object
          oneOf:
            - $ref: '#/components/schemas/VariantOne'
            - $ref: '#/components/schemas/VariantTwo'
        tags:
          type: array
          items:
            type: string
            minLength: 2
            maxLength: 4
        meta:
          $ref: '#/components/schemas/CommonRef'
        amount:
          type: number
          minimum: 0
          maximum: 100
        count:
          type: integer
          multipleOf: 5
        note:
          type: string
          minLength: 3
          maxLength: 8
        strictObj:
          type: object
          additionalProperties: false
          required: [allowed]
          properties:
            allowed:
              type: string
    VariantOne:
      type: object
      required: [type, code]
      properties:
        type:
          type: string
          enum: [ONE]
        code:
          type: string
          pattern: 'C[0-9]{2}'
        extraOne:
          type: string
    VariantTwo:
      type: object
      required: [type, flag]
      properties:
        type:
          type: string
          enum: [TWO]
        flag:
          type: boolean
        nested:
          type: object
          properties:
            inner:
              type: string

name: Publish AsyncAPI Payload Validator to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version-exists: ${{ steps.check-version.outputs.exists }}
    
    steps:
      - name: Check if version exists on PyPI
        id: check-version
        run: |
          echo "Checking if version ${{ inputs.version }} exists on PyPI..."
          
          # Query PyPI API for the package
          RESPONSE=$(curl -s "https://pypi.org/pypi/asyncapi-payload-validator/json" || echo '{}')
          
          # Check if the version exists in releases
          if echo "$RESPONSE" | grep -q "\"${{ inputs.version }}\""; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::error::Version ${{ inputs.version }} already exists on PyPI!"
            exit 1
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Version ${{ inputs.version }} is available"
          fi

  build:
    name: Build distribution
    needs: [validate-version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ inputs.version }}"/' pyproject.toml
          echo "Updated version to ${{ inputs.version }}"
          cat pyproject.toml | grep "^version"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/asyncapi-payload-validator
    permissions:
      id-token: write
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Set version output
        id: set-version
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

  draft-release:
    name: Draft GitHub Release
    needs: [publish-to-pypi]
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/_draft_release.yaml
    with:
      version: ${{ needs.publish-to-pypi.outputs.version }}
    secrets: inherit
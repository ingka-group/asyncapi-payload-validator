name: AsyncAPI Payload Validator Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  validate-payloads:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run all tests (verbose)
        env:
          VALIDATOR_TEST_VERBOSE: '1'
        run: |
          echo 'Running all tests in tests/ directory:'
          pytest tests/ -v